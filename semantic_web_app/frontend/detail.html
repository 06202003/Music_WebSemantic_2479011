<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Song RDF Detail</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js"></script>
    <link href="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
      }
      .navbar {
        background: #fff;
        box-shadow: 0 2px 8px #0001;
        border-bottom: 2px solid #e0e7ff;
      }
      .nav-link {
        transition: color 0.2s;
      }
      .nav-link.active,
      .nav-link:hover {
        color: #1db954 !important;
      }
      @media (max-width: 640px) {
        h1 {
          font-size: 1.5rem !important;
        }
        .container {
          padding-left: 0.5rem !important;
          padding-right: 0.5rem !important;
        }
        #tab-content {
          padding-left: 0 !important;
          padding-right: 0 !important;
        }
        table {
          font-size: 0.95rem !important;
        }
        .tab-pane {
          padding-left: 0 !important;
          padding-right: 0 !important;
        }
      }
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <nav class="navbar mb-8">
      <div class="container mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center">
        <div class="flex space-x-6 mb-2 sm:mb-0">
          <a href="index.html" class="nav-link font-semibold text-gray-700 hover:text-green-600">Home</a>
          <a href="sparql.html" class="nav-link font-semibold text-gray-700 hover:text-green-600">SPARQL</a>
          <a href="graph.html" class="nav-link font-semibold text-gray-700 hover:text-green-600 active">Graph</a>
        </div>
        <span class="text-xs text-gray-400 tracking-wide">Semantic Music Explorer</span>
      </div>
    </nav>
    <div class="container mx-auto py-8 px-6 sm:px-10 md:px-16 lg:px-24 xl:px-32">
      <a href="index.html" class="text-green-600 hover:underline">&larr; Back to List</a>
      <h1 class="text-4xl font-extrabold mb-6 text-center text-gray-800 tracking-tight" style="letter-spacing: -0.03em">Song Semantic Detail</h1>
      <div class="mb-4">
        <nav class="flex border-b">
          <button id="tab-overview" class="px-4 py-2 focus:outline-none border-b-2 border-green-600 font-semibold">Overview</button>
          <button id="tab-semantic" class="px-4 py-2 focus:outline-none text-gray-600">Semantic Relations</button>
          <button id="tab-reasoning" class="px-4 py-2 focus:outline-none text-gray-600">Why Semantic?</button>
          <button id="tab-triples" class="px-4 py-2 focus:outline-none text-gray-600">RDF Triples</button>
        </nav>
      </div>
      <div id="tab-content" class="px-4">
        <div id="overview" class="tab-pane"></div>
        <div id="semantic" class="tab-pane hidden"></div>
        <div id="reasoning" class="tab-pane hidden"></div>
        <div id="triples-pane" class="tab-pane hidden"></div>
      </div>
    </div>
    <script>
      // Ensure correct initial tab state on page load
      window.addEventListener('DOMContentLoaded', function () {
        document.getElementById('overview').classList.remove('hidden');
        document.getElementById('semantic').classList.add('hidden');
        document.getElementById('reasoning').classList.add('hidden');
        document.getElementById('triples-pane').classList.add('hidden');
        document.getElementById('tab-overview').classList.add('border-blue-600', 'font-semibold');
        document.getElementById('tab-overview').classList.remove('text-gray-600');
        document.getElementById('tab-semantic').classList.remove('border-blue-600', 'font-semibold');
        document.getElementById('tab-semantic').classList.add('text-gray-600');
        document.getElementById('tab-reasoning').classList.remove('border-blue-600', 'font-semibold');
        document.getElementById('tab-reasoning').classList.add('text-gray-600');
        document.getElementById('tab-triples').classList.remove('border-blue-600', 'font-semibold');
        document.getElementById('tab-triples').classList.add('text-gray-600');
      });

      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      fetch(`http://localhost:8000/api/songs/${id}`)
        .then((res) => res.json())
        .then((data) => {
          // Overview Tab
          const info = data.info;
          const artistCollabs = data.artist_collaborations || [];
          const collabType = artistCollabs.length > 0 ? artistCollabs[0].type : null;
          const collabArtistSet = new Set();
          artistCollabs.forEach((c) => {
            collabArtistSet.add(c.artist_1);
            collabArtistSet.add(c.artist_2);
          });
          const collabArtists = Array.from(collabArtistSet);
          const collabSummary =
            collabArtists.length > 1
              ? `<div class="mt-3 p-3 rounded bg-green-50 border border-green-200 text-green-800 text-sm"><span class="font-semibold">Collaboration Type:</span> ${collabType}<br/><span class="font-semibold">Artists:</span> ${collabArtists.join(', ')}</div>`
              : '<div class="mt-3 p-3 rounded bg-gray-50 border border-gray-200 text-gray-600 text-sm">No explicit collaboration pattern detected on this song.</div>';
          document.getElementById('overview').innerHTML = `
            <h2 class="text-xl font-semibold mb-2">${info.title}</h2>
            <p><span class="font-medium">Artist:</span> ${info.artist}</p>
            <p><span class="font-medium">Album:</span> ${info.album || '-'} </p>
            <p><span class="font-medium">Genre:</span> <a href="#" class="text-blue-600 hover:underline" onclick="window.searchByGenre('${info.genre}')">${info.genre || '-'}</a></p>
            <p><span class="font-medium">Year:</span> ${info.year || '-'}</p>
            <p><span class="font-medium">Country:</span> ${info.country || '-'}</p>
            <p><span class="font-medium">Source:</span> ${info.source || '-'}</p>
            ${collabSummary}
          `;
          // Semantic Relations Tab
          const relA = data.related_artist;
          const relAlbum = data.related_album;
          const relGenre = data.related_genre;
          let semanticHtml = `<div class="mb-4"><h3 class="font-bold mb-2">Other Songs by Same Artist</h3>`;
          semanticHtml +=
            relA.length === 0
              ? '<p class="text-gray-500">No other songs by this artist.</p>'
              : '<ul class="list-disc pl-5">' + relA.map((s) => `<li><a href="detail.html?id=${s.id}" class="text-blue-600 hover:underline">${s.title}</a></li>`).join('') + '</ul>';
          semanticHtml += `</div><div><h3 class="font-bold mb-2">Songs in Same Album</h3>`;
          semanticHtml +=
            relAlbum.length === 0
              ? '<p class="text-gray-500">No other songs in this album.</p>'
              : '<ul class="list-disc pl-5">' + relAlbum.map((s) => `<li><a href="detail.html?id=${s.id}" class="text-blue-600 hover:underline">${s.title}</a></li>`).join('') + '</ul>';
          semanticHtml += `</div><div><h3 class="font-bold mb-2">Songs in Same Genre</h3>`;
          semanticHtml +=
            relGenre.length === 0
              ? '<p class="text-gray-500">No other songs in this genre.</p>'
              : '<ul class="list-disc pl-5">' + relGenre.map((s) => `<li><a href="detail.html?id=${s.id}" class="text-blue-600 hover:underline">${s.title}</a></li>`).join('') + '</ul>';
          semanticHtml += '</div><div><h3 class="font-bold mb-2">Artist Collaboration Semantic</h3>';
          semanticHtml +=
            artistCollabs.length === 0
              ? '<p class="text-gray-500">No explicit artist collaboration detected for this song.</p>'
              : `<p class="text-sm text-gray-700 mb-2">This song is detected as <span class="font-semibold">${collabType}</span> collaboration.</p><ul class="list-disc pl-5">` +
                artistCollabs.map((c) => `<li><span class="font-medium">${c.artist_1}</span> collaborates with <span class="font-medium">${c.artist_2}</span> <span class="text-xs text-gray-500">(${c.type})</span></li>`).join('') +
                '</ul>';
          semanticHtml += '</div>';
          document.getElementById('semantic').innerHTML = semanticHtml;

          const explanation = data.semantic_explanation || {};
          const explicitFacts = explanation.explicit_facts || [];
          const inferredFacts = explanation.inferred_facts || [];
          const inferredSongs = explanation.inferred_related_songs || [];
          const concepts = explanation.concepts || [];
          const reasoningHtml = `
            <div class="mb-4 p-4 rounded bg-indigo-50 border border-indigo-200 text-indigo-900">
              <h3 class="font-bold mb-2">Semantic Reasoning Summary</h3>
              <p class="text-sm">${explanation.human_summary || 'No semantic explanation available.'}</p>
            </div>
            <div class="mb-4">
              <h3 class="font-bold mb-2">Ontology Concepts Used</h3>
              <div class="flex flex-wrap gap-2">
                ${concepts.length === 0 ? '<span class="text-gray-500 text-sm">No concept data.</span>' : concepts.map((c) => `<span class="px-3 py-1 rounded-full bg-blue-100 text-blue-800 text-xs font-semibold">${c}</span>`).join('')}
              </div>
            </div>
            <div class="mb-4">
              <h3 class="font-bold mb-2">Explicit Facts (from source data)</h3>
              ${explicitFacts.length === 0 ? '<p class="text-gray-500">No explicit facts.</p>' : '<ul class="list-disc pl-5">' + explicitFacts.map((f) => `<li>${f}</li>`).join('') + '</ul>'}
            </div>
            <div class="mb-4">
              <h3 class="font-bold mb-2">Inferred Facts (from graph rules)</h3>
              ${inferredFacts.length === 0 ? '<p class="text-gray-500">No inferred facts for this song yet.</p>' : '<ul class="list-disc pl-5">' + inferredFacts.map((f) => `<li>${f}</li>`).join('') + '</ul>'}
            </div>
            <div class="mb-4">
              <h3 class="font-bold mb-2">Inferred Related Songs</h3>
              ${inferredSongs.length === 0 ? '<p class="text-gray-500">No inferred related songs.</p>' : '<ul class="list-disc pl-5">' + inferredSongs.map((s) => `<li><a href="detail.html?id=${s.id}" class="text-blue-600 hover:underline">${s.title}</a></li>`).join('') + '</ul>'}
            </div>
            <div class="p-3 rounded bg-gray-50 border border-gray-200 text-sm">
              <span class="font-semibold">Provenance:</span>
              source=${(explanation.provenance && explanation.provenance.source) || '-'};
              fetchedAt=${(explanation.provenance && explanation.provenance.fetched_at) || '-'}
            </div>
          `;
          document.getElementById('reasoning').innerHTML = reasoningHtml;
          // RDF Triples Tab
          document.getElementById('triples-pane').innerHTML =
            '<h3 class="font-bold mb-2">RDF Triples</h3>' +
            '<table class="min-w-full text-sm mb-4"><thead><tr><th class="px-2 py-1">Subject</th><th class="px-2 py-1">Predicate</th><th class="px-2 py-1">Object</th></tr></thead><tbody>' +
            data.triples.map((t) => `<tr><td class="border px-2 py-1">${t.subject}</td><td class="border px-2 py-1">${t.predicate}</td><td class="border px-2 py-1">${t.object}</td></tr>`).join('') +
            '</tbody></table>' +
            '<h3 class="font-bold mb-2">Knowledge Graph</h3>' +
            '<div id="mini-graph" style="height: 100vh; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001;"></div>';

          // --- Knowledge Graph Visualization (semantic relations) ---
          // Main node: current song
          const nodes = [];
          const edges = [];
          // Song node
          nodes.push({ id: `song_${info.id}`, label: info.title, group: 'song', color: { background: '#f87171', border: '#b91c1c' }, font: { color: '#b91c1c', size: 16, bold: true } });
          // Artist node
          nodes.push({ id: `artist_${info.artist}`, label: info.artist, group: 'artist', color: '#fbbf24', shape: 'ellipse' });
          edges.push({ from: `song_${info.id}`, to: `artist_${info.artist}`, label: 'performedBy', color: '#fbbf24', arrows: 'to' });
          // Album node
          if (info.album) {
            nodes.push({ id: `album_${info.album}`, label: info.album, group: 'album', color: '#60a5fa', shape: 'box' });
            edges.push({ from: `song_${info.id}`, to: `album_${info.album}`, label: 'partOfAlbum', color: '#60a5fa', arrows: 'to' });
          }
          // Genre node
          if (info.genre) {
            nodes.push({ id: `genre_${info.genre}`, label: info.genre, group: 'genre', color: '#34d399', shape: 'diamond' });
            edges.push({ from: `song_${info.id}`, to: `genre_${info.genre}`, label: 'hasGenre', color: '#34d399', arrows: 'to' });
          }
          // Other songs by same artist
          data.related_artist.forEach((song) => {
            nodes.push({ id: `song_${song.id}`, label: song.title, group: 'song' });
            edges.push({ from: `artist_${info.artist}`, to: `song_${song.id}`, label: 'performedBy', color: '#fbbf24', arrows: 'to', dashes: true });
          });
          // Songs in same album
          data.related_album.forEach((song) => {
            nodes.push({ id: `song_${song.id}`, label: song.title, group: 'song' });
            if (info.album) edges.push({ from: `album_${info.album}`, to: `song_${song.id}`, label: 'partOfAlbum', color: '#60a5fa', arrows: 'to', dashes: true });
          });
          // Songs in same genre
          data.related_genre.forEach((song) => {
            nodes.push({ id: `song_${song.id}`, label: song.title, group: 'song' });
            if (info.genre) edges.push({ from: `genre_${info.genre}`, to: `song_${song.id}`, label: 'hasGenre', color: '#34d399', arrows: 'to', dashes: true });
          });
          // Remove duplicate nodes by id
          const nodeMap = {};
          nodes.forEach((n) => {
            nodeMap[n.id] = n;
          });
          const uniqueNodes = Object.values(nodeMap);
          const container = document.getElementById('mini-graph');
          if (container) {
            const visData = { nodes: new vis.DataSet(uniqueNodes), edges: new vis.DataSet(edges) };
            const options = {
              nodes: { shape: 'dot', size: 16, font: { size: 14 } },
              edges: { font: { align: 'middle', size: 10 }, smooth: true },
              groups: {
                song: { color: '#6366f1', shape: 'dot' },
                artist: { color: '#fbbf24', shape: 'ellipse' },
                album: { color: '#60a5fa', shape: 'box' },
                genre: { color: '#34d399', shape: 'diamond' },
              },
              physics: { stabilization: false, barnesHut: { gravitationalConstant: -30000, springLength: 80 } },
              interaction: { hover: true, tooltipDelay: 100, navigationButtons: false, keyboard: false },
            };
            new vis.Network(container, visData, options);
          }
        });

      // Tab navigation logic
      const tabOverview = document.getElementById('tab-overview');
      const tabSemantic = document.getElementById('tab-semantic');
      const tabReasoning = document.getElementById('tab-reasoning');
      const tabTriples = document.getElementById('tab-triples');
      const paneOverview = document.getElementById('overview');
      const paneSemantic = document.getElementById('semantic');
      const paneReasoning = document.getElementById('reasoning');
      const paneTriples = document.getElementById('triples-pane');

      tabOverview.onclick = function () {
        tabOverview.classList.add('border-blue-600', 'font-semibold');
        tabOverview.classList.remove('text-gray-600');
        tabSemantic.classList.remove('border-blue-600', 'font-semibold');
        tabSemantic.classList.add('text-gray-600');
        tabReasoning.classList.remove('border-blue-600', 'font-semibold');
        tabReasoning.classList.add('text-gray-600');
        tabTriples.classList.remove('border-blue-600', 'font-semibold');
        tabTriples.classList.add('text-gray-600');
        paneOverview.classList.remove('hidden');
        paneSemantic.classList.add('hidden');
        paneReasoning.classList.add('hidden');
        paneTriples.classList.add('hidden');
      };
      tabSemantic.onclick = function () {
        tabSemantic.classList.add('border-blue-600', 'font-semibold');
        tabSemantic.classList.remove('text-gray-600');
        tabOverview.classList.remove('border-blue-600', 'font-semibold');
        tabOverview.classList.add('text-gray-600');
        tabReasoning.classList.remove('border-blue-600', 'font-semibold');
        tabReasoning.classList.add('text-gray-600');
        tabTriples.classList.remove('border-blue-600', 'font-semibold');
        tabTriples.classList.add('text-gray-600');
        paneOverview.classList.add('hidden');
        paneSemantic.classList.remove('hidden');
        paneReasoning.classList.add('hidden');
        paneTriples.classList.add('hidden');
      };
      tabReasoning.onclick = function () {
        tabReasoning.classList.add('border-blue-600', 'font-semibold');
        tabReasoning.classList.remove('text-gray-600');
        tabOverview.classList.remove('border-blue-600', 'font-semibold');
        tabOverview.classList.add('text-gray-600');
        tabSemantic.classList.remove('border-blue-600', 'font-semibold');
        tabSemantic.classList.add('text-gray-600');
        tabTriples.classList.remove('border-blue-600', 'font-semibold');
        tabTriples.classList.add('text-gray-600');
        paneOverview.classList.add('hidden');
        paneSemantic.classList.add('hidden');
        paneReasoning.classList.remove('hidden');
        paneTriples.classList.add('hidden');
      };
      tabTriples.onclick = function () {
        tabTriples.classList.add('border-blue-600', 'font-semibold');
        tabTriples.classList.remove('text-gray-600');
        tabOverview.classList.remove('border-blue-600', 'font-semibold');
        tabOverview.classList.add('text-gray-600');
        tabSemantic.classList.remove('border-blue-600', 'font-semibold');
        tabSemantic.classList.add('text-gray-600');
        tabReasoning.classList.remove('border-blue-600', 'font-semibold');
        tabReasoning.classList.add('text-gray-600');
        paneOverview.classList.add('hidden');
        paneSemantic.classList.add('hidden');
        paneReasoning.classList.add('hidden');
        paneTriples.classList.remove('hidden');
      };
    </script>
    <!-- Removed duplicate tab navigation script -->
  </body>
</html>
