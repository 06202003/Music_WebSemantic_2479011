<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semantic Music Knowledge Graph</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js"></script>
    <link href="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.css" rel="stylesheet" />
    <style>
      body {
        font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
      }
      .navbar {
        background: #fff;
        box-shadow: 0 2px 8px #0001;
        border-bottom: 2px solid #e0e7ff;
      }
      .nav-link {
        transition: color 0.2s;
      }
      .nav-link.active,
      .nav-link:hover {
        color: #1db954 !important;
      }
      .search-bar {
        box-shadow: 0 2px 8px #0001;
        background: #fff;
        border-radius: 9999px;
        padding: 0.5rem 1rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        max-width: 500px;
        margin: 0 auto;
      }
      @media (max-width: 640px) {
        .search-bar {
          max-width: 100%;
          padding: 0.5rem;
        }
        #network {
          height: 350px !important;
          font-size: 1rem !important;
        }
        h1 {
          font-size: 1.5rem !important;
        }
        .container {
          padding-left: 0.5rem !important;
          padding-right: 0.5rem !important;
        }
      }
      #network {
        transition: box-shadow 0.2s;
      }
      #network:focus-within,
      #network:hover {
        box-shadow: 0 4px 16px #1db95422;
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-gray-50 min-h-screen">
    <nav class="navbar mb-8">
      <div class="container mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center">
        <div class="flex space-x-6 mb-2 sm:mb-0">
          <a href="index.html" class="nav-link font-semibold text-gray-700 hover:text-green-600">Home</a>
          <a href="sparql.html" class="nav-link font-semibold text-gray-700 hover:text-green-600">SPARQL</a>
          <a href="graph.html" class="nav-link font-semibold text-gray-700 hover:text-green-600 active">Graph</a>
        </div>
        <span class="text-xs text-gray-400 tracking-wide">Semantic Music Explorer</span>
      </div>
    </nav>
    <div class="container mx-auto py-8 px-6 sm:px-10 md:px-16 lg:px-24 xl:px-32">
      <h1 class="text-4xl font-extrabold mb-6 text-center text-gray-800 tracking-tight" style="letter-spacing: -0.03em">Semantic Music Knowledge Graph</h1>
      <div class="search-bar mb-6">
        <input id="searchInput" type="text" placeholder="Cari lagu, artist, genre, album..." class="flex-1 outline-none bg-transparent text-gray-800 text-base px-2 py-2" />
        <button id="searchBtn" class="bg-green-500 hover:bg-green-600 text-white font-semibold px-5 py-2 rounded-full transition">Search</button>
        <button id="reload" class="bg-gray-200 hover:bg-blue-100 text-blue-700 font-semibold px-4 py-2 rounded-full transition">Show All</button>
      </div>
      <div
        id="network"
        class="mt-5"
        style="height: 600px; background: #fff; border-radius: 18px; box-shadow: 0 2px 16px #0002; display: flex; align-items: center; justify-content: center; color: #888; font-size: 1.2rem; overflow: auto; padding: 1.5rem"
      >
        <span id="network-placeholder">Cari lagu, artist, genre, atau album untuk menampilkan knowledge graph 🎶</span>
      </div>
    </div>
    <script>
      async function fetchAllSongs() {
        const res = await fetch('http://localhost:8000/api/songs');
        return await res.json();
      }

      async function fetchSongRelations(songId) {
        const res = await fetch(`http://localhost:8000/api/songs/${songId}`);
        return await res.json();
      }

      // --- GRAPH RENDERING LOGIC ---
      let allSongsCache = null;

      async function buildGraph(filterQuery = null) {
        // Hide placeholder
        document.getElementById('network-placeholder')?.remove();
        // Use cache if available
        let songs = allSongsCache;
        if (!songs) {
          songs = await fetchAllSongs();
          allSongsCache = songs;
        }
        const nodes = [];
        const edges = [];
        const songMap = {};
        const artistMap = {};
        const albumMap = {};
        const genreMap = {};

        // If filterQuery, show subgraph for any match in title, artist, album, or genre
        let filteredSongs = songs;
        let focusQuery = null;
        if (filterQuery && filterQuery.trim() !== '') {
          focusQuery = filterQuery.trim().toLowerCase();
          filteredSongs = songs.filter((song) => {
            return (
              (song.title && song.title.toLowerCase().includes(focusQuery)) ||
              (song.artist && song.artist.toLowerCase().includes(focusQuery)) ||
              (song.album && song.album.toLowerCase().includes(focusQuery)) ||
              (song.genre && song.genre.toLowerCase().includes(focusQuery))
            );
          });
        }

        // Build subgraph: artist node, their songs, albums, genres, and semantic neighbors
        let subgraphSongIds = new Set();
        let subgraphArtistNames = new Set();
        let subgraphAlbumNames = new Set();
        let subgraphGenreNames = new Set();
        let semanticSongIds = new Set();

        if (filterQuery && filteredSongs.length > 0) {
          // Add all songs matching query
          filteredSongs.forEach((song) => {
            subgraphSongIds.add(song.id);
            subgraphArtistNames.add(song.artist);
            if (song.album) subgraphAlbumNames.add(song.album);
            if (song.genre) subgraphGenreNames.add(song.genre);
          });
          // For each song, fetch semantic neighbors (same artist/album/genre)
          for (let i = 0; i < filteredSongs.length; i++) {
            const song = filteredSongs[i];
            const rel = await fetchSongRelations(song.id);
            rel.related_artist.forEach((other) => semanticSongIds.add(other.id));
            rel.related_album.forEach((other) => semanticSongIds.add(other.id));
            rel.related_genre.forEach((other) => semanticSongIds.add(other.id));
          }
        }

        // Add nodes and edges for subgraph
        let renderSongs;
        if (filterQuery && filteredSongs.length > 0) {
          // Only show filtered songs + semantic neighbors
          renderSongs = songs.filter((song) => subgraphSongIds.has(song.id) || semanticSongIds.has(song.id));
        } else {
          // Show all
          renderSongs = songs;
        }

        renderSongs.forEach((song) => {
          // Highlight if in filteredSongs
          const isFocus = filterQuery && filteredSongs.some((s) => s.id === song.id);
          nodes.push({
            id: `song_${song.id}`,
            label: song.title,
            group: 'song',
            title: `Song: ${song.title}\nArtist: ${song.artist}\nAlbum: ${song.album}\nGenre: ${song.genre}`,
            color: isFocus ? { background: '#f87171', border: '#b91c1c' } : undefined,
            font: isFocus ? { color: '#b91c1c', size: 16, bold: true } : undefined,
          });
          songMap[song.id] = song;
          // Add artist node
          if (song.artist && !artistMap[song.artist]) {
            nodes.push({ id: `artist_${song.artist}`, label: song.artist, group: 'artist', color: filterQuery && song.artist.toLowerCase().includes(focusQuery) ? '#f87171' : '#fbbf24', shape: 'ellipse' });
            artistMap[song.artist] = true;
          }
          // Add album node
          if (song.album && !albumMap[song.album]) {
            nodes.push({ id: `album_${song.album}`, label: song.album, group: 'album', color: '#60a5fa', shape: 'box' });
            albumMap[song.album] = true;
          }
          // Add genre node
          if (song.genre && !genreMap[song.genre]) {
            nodes.push({ id: `genre_${song.genre}`, label: song.genre, group: 'genre', color: '#34d399', shape: 'diamond' });
            genreMap[song.genre] = true;
          }
          // Edges from song to artist/album/genre
          edges.push({ from: `song_${song.id}`, to: `artist_${song.artist}`, label: 'performedBy', color: '#fbbf24', arrows: 'to', width: isFocus ? 3 : 1 });
          edges.push({ from: `song_${song.id}`, to: `album_${song.album}`, label: 'partOfAlbum', color: '#60a5fa', arrows: 'to', width: isFocus ? 3 : 1 });
          edges.push({ from: `song_${song.id}`, to: `genre_${song.genre}`, label: 'hasGenre', color: '#34d399', arrows: 'to', width: isFocus ? 3 : 1 });
        });

        // Add semantic relations for filtered songs
        if (filterQuery && filteredSongs.length > 0) {
          for (let i = 0; i < filteredSongs.length; i++) {
            const song = filteredSongs[i];
            const rel = await fetchSongRelations(song.id);
            rel.related_artist.forEach((other) => {
              edges.push({ from: `song_${song.id}`, to: `song_${other.id}`, label: 'same artist', color: '#fbbf24', dashes: true, width: 2 });
            });
            rel.related_album.forEach((other) => {
              edges.push({ from: `song_${song.id}`, to: `song_${other.id}`, label: 'same album', color: '#60a5fa', dashes: true, width: 2 });
            });
            rel.related_genre.forEach((other) => {
              edges.push({ from: `song_${song.id}`, to: `song_${other.id}`, label: 'same genre', color: '#34d399', dashes: true, width: 2 });
            });
          }
        } else {
          // Default: add semantic relations for a subset for performance
          for (let i = 0; i < Math.min(renderSongs.length, 50); i++) {
            const song = renderSongs[i];
            const rel = await fetchSongRelations(song.id);
            rel.related_artist.forEach((other) => {
              edges.push({ from: `song_${song.id}`, to: `song_${other.id}`, label: 'same artist', color: '#fbbf24', dashes: true });
            });
            rel.related_album.forEach((other) => {
              edges.push({ from: `song_${song.id}`, to: `song_${other.id}`, label: 'same album', color: '#60a5fa', dashes: true });
            });
            rel.related_genre.forEach((other) => {
              edges.push({ from: `song_${song.id}`, to: `song_${other.id}`, label: 'same genre', color: '#34d399', dashes: true });
            });
          }
        }

        const container = document.getElementById('network');
        const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
        const options = {
          nodes: {
            shape: 'dot',
            size: 16,
            font: { size: 14 },
          },
          edges: {
            font: { align: 'middle', size: 10 },
            smooth: true,
          },
          groups: {
            song: { color: '#6366f1', shape: 'dot' },
            artist: { color: '#fbbf24', shape: 'ellipse' },
            album: { color: '#60a5fa', shape: 'box' },
            genre: { color: '#34d399', shape: 'diamond' },
          },
          physics: {
            stabilization: false,
            barnesHut: { gravitationalConstant: -30000, springLength: 120 },
          },
          interaction: {
            hover: true,
            tooltipDelay: 100,
            navigationButtons: true,
            keyboard: true,
          },
        };
        const network = new vis.Network(container, data, options);
      }

      document.getElementById('reload').onclick = () => buildGraph();
      document.getElementById('searchBtn').onclick = () => {
        const val = document.getElementById('searchInput').value;
        buildGraph(val);
      };
      document.getElementById('searchInput').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          buildGraph(this.value);
        }
      });
      // Jangan render KG di awal, biarkan kosong sampai user search/reload
    </script>
  </body>
</html>
